services:
  app:
    build: .
    container_name: book-diary-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://bookuser:bookpass@db:5432/bookdiary"
    ports:
      - "3000:3000"
    volumes:                          
      - uploads:/app/uploads          
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: book-diary-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookuser
      POSTGRES_PASSWORD: bookpass
      POSTGRES_DB: bookdiary
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  uploads:                            